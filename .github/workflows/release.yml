name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write   # Required to create GitHub Releases

jobs:
  # ── Type-check and lint ────────────────────────────────────────────────────
  quality:
    name: Type-check & lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Type-check
        run: npm run type-check

      - name: Lint
        run: npm run lint

  # ── Build all tenants in parallel ─────────────────────────────────────────
  build:
    name: Build — ${{ matrix.tenant }}
    runs-on: ubuntu-latest
    needs: quality

    strategy:
      fail-fast: false
      matrix:
        tenant: [default, acme, globex]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build ${{ matrix.tenant }}
        run: npm run build
        env:
          VITE_TENANT: ${{ matrix.tenant }}

      - name: Zip dist/${{ matrix.tenant }}
        run: zip -r ticketflow-${{ matrix.tenant }}-${{ github.ref_name }}.zip dist/${{ matrix.tenant }}

      - name: Upload release asset
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.tenant }}
          path: ticketflow-${{ matrix.tenant }}-${{ github.ref_name }}.zip
          retention-days: 1

  # ── Create GitHub Release with all tenant zips ────────────────────────────
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Download all release assets
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true
          path: release-assets/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: TicketFlow ${{ github.ref_name }}
          generate_release_notes: true
          files: release-assets/*.zip
          body: |
            ## TicketFlow ${{ github.ref_name }}

            ### Tenant builds included
            | Tenant | File |
            |--------|------|
            | Default | `ticketflow-default-${{ github.ref_name }}.zip` |
            | Acme | `ticketflow-acme-${{ github.ref_name }}.zip` |
            | Globex | `ticketflow-globex-${{ github.ref_name }}.zip` |

            Each zip contains the static build for that tenant, ready to deploy.
